version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  backend:
    build:
      context: ./backend
    container_name: cases-backend
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_USER: root
      MONGO_PASSWORD: example
      MONGO_DB: casesdb
      MONGO_COLLECTION: cases
      # Or set MONGO_URI directly if you prefer:
      # MONGO_URI: mongodb://root:example@mongo:27017/?authSource=admin
    depends_on:
      - mongo
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: cases-frontend
    ports:
      - "8079:80"
    depends_on:
      - backend

volumes:
  mongodata:

